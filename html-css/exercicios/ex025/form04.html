<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 04</title>
</head>
<body>
    <h1>Continuando com Formulãrios</h1>

    <fieldset>
        <legend>Dados Pessoais</legend>
        <form action="cadastro.php" method="get" autocomplete="on">
            <p>
                <label for="inome">nome</label>
                <input type="text" name="nome" id="inome" minlength="8"
                maxlength="20" required>
            </p>
        <p>
            <label for="iemail">Email</label>
            <input type="email" name="email" id="iemail" autocomplete="email" required>
        </p>
        <p>
        <label for="itel">telefone</label>
        <input type="telefone" name="telefone" id="itel" autocomplete="on"
        pattern="^\(\d{2}\)\ d{4-5}-\d{4}&" required placeholder="(xx) xxxx-xxxx">
        </p>
    </fieldset>
    <!--ESTUDAR MAIS SOBRE RegEX-->
<p>
         <input type="submit" value="enviar">
         <input type="reset" value="limpar">
</p>
</form>
</body>
</html>
