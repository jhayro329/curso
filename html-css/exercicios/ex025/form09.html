<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 09</title>
</head>

<body>
    <form action="cadastro.php" method="post" autocomplete="on">

        <p>
            <label for="iano">Ano que voce nasceu</label>
            <input type="number" name="ano" id="iano" min="1900" max="2026" oninput="calcidade()"> <!--declaraçao para calcular a IDADE-->
        </p>
        <p>
            <label for="iidade">Sua idade é:</label>
            <output id="iidade">0</output>   <!--resultado do cáuculo-->
        </p>

        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>

    </form>
    <script>
        function calcidade() {  /*resultado feito com Javascript*/
            let atual = new Date().getFullYear()
            iidade.innerHTML = Number(atual) - Number(iano.value)
        }
    </script>
</body>

</html>
