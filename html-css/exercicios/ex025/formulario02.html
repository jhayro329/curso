<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Teste de formulãrio</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
     <p>
         <label for="iuso">Usuário</label>
         <input type="text" name="uso" id="iusu" required minlength="5" maxlength="30" 
          size="10" placeholder="nome do usuário" autocomplete="username">
     </p>
       <p>
        <label for="isen">Senha</label>
        <input type="password" name="sen" id="isen" required minlength="5" maxlength="15" size="8" placeholder="mínimo 8 letras">
       </p>
       <p>
        <input type="submit" value="enviar" >
        <input type="reset" value="limpar">
       </p>
    </form>
</body>
</html>
