<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style>
    table{
        width: 400px;
        height: 400px;
        
        border: 1px solid black;
        border-collapse: collapse; 
    }
    td{
       border: 1px solid black;
       text-align: left;
       vertical-align: bottom;
        
    }
   
    </style>
    <title>CONFIGURANDO TABELA</title>
</head>
<body>
    <h1>Criando Tabelas</h1>
    <table>
        <tr>
            <td>Flamengo</td>
            <td>Palmeiras</td>
            <td>Atlético MG</td>
        </tr>
        <tr>
            <td>Fluminense</td>
            <td>Botafogo</td>
            <td>Vasco</td>
        </tr>
        <tr>
            <td>Corinthians</td>
            <td>São Paulo</td>
            <td>Santos</td>
        </tr>
    </table>
</body>
</html>
