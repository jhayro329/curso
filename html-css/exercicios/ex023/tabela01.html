<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: antiquewhite;
}
h1{
    background-image: linear-gradient(to right, red , black,green ,rgb(100, 3, 111),white )  ;
    text-align: center;
    color: white;
    border-radius: 10px;
}
table{
    width: 700px;
    padding: 6px;
}


td{
    border: 1px solid black;
    border-collapse: collapse;
    border-radius: 6px;
     padding: 6px;
     text-align: center;
}
td:hover{
    opacity: 0.7;
}
  td.fla{
    background-image: linear-gradient(to right, red , black)  ;
    color: white;
}
td.pal{
    background-image: linear-gradient(to right, rgb(3, 147, 3) , white)  ;
}
td.galo{
    background-image: linear-gradient(to right, black,white)  ;
    color: white;
}
td.flu{
    background-image: linear-gradient(to right, rgba(0, 128, 0, 0.669) , rgb(76, 2, 66))  ;
    color: white;
}
td.bot{
    background-image: linear-gradient(to right,white , black)  ;
    color: white;
}
td.vas{
    background-image: linear-gradient(to right, black,white,rgb(96, 7, 7))  ;
}
td.gaviao{
    background-image: linear-gradient(to right, white , black)  ;
    color: white;
}
td.saop{
    background-image: linear-gradient(to right, red ,white, black)  ;
}
td.peixe{
    background-image: linear-gradient(to right,white , black)  ;
}

    </style>

    <title>Tabelas</title>
</head>
<body>
    <h1>Criando Tabelas</h1>
    <table>
        <tr>
            <td class="fla">Flamengo</td>
            <td class="pal">Palmeiras</td>
            <td class="galo">Atlético MG</td>
        </tr>
        <tr>
            <td class="flu">Fluminense</td>
            <td class="bot">Botafogo</td>
            <td class="vas">Vasco</td>
        </tr>
        <tr>
            <td class="gaviao">Corinthians</td>
            <td class="saop">São Paulo</td>
            <td class="peixe">Santos</td>
        </tr>
    </table>
</body>
</html>
