<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicioc de Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        th,td{
            border: 1px solid black;
            text-align: center;
        }
        col.cnome , col.cidade{
            background-color: rgba(222, 184, 135, 0.493);
        }
        col.csexo , col.cprof{
           background-color: rgba(244, 158, 46, 0.493); 
        }

    </style>
</head>
<body>
    <h2>Configurando com Colgroup </h2>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade" span="2">
           
        </colgroup>
        <caption>Colorindo as colunas de cores diferentes</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana</td>
            <td>F</td>
            <td>34</td>
            <td>Médica</td>
        </tr>
          <tr>
            <td>Eva</td>
            <td>F</td>
            <td>39</td>
            <td>Professora</td>
        </tr>
          <tr>
            <td>Ema</td>
            <td>F</td>
            <td>37</td>
            <td>Costureira</td>
        </tr>

    </table>

    
</body>
</html>
