<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.conteiner{
            background-color: rgb(112, 83, 45);

             display:flex;
             flex-flow: row wrap;
             align-content: space-evenly;
             height: 400px;
        
           
           
            
            
        }
        div.item{
            background-color: rgb(45, 150, 115);
            border: 1px solid black;
            text-align:center ;
            padding: 30px;
        }
        div#i1{
           order: 3;
        }
         div#i2{
            order: -4;
            
        }
         div#i3{
            order: 2;
        }
         div#i4{
           order: 1; 
        }
         div#i5{
            order: 7;
        }
         div#i6{
            order: 3;
        }
         div#i7{
            order: -5;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
        

    </div>
    
</body>
</html>
