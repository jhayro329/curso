<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.conteiner{
            background-color: rgb(112, 83, 45);

             display:flex;
             flex-flow: row nowrap;
            
      
        
           
           
            
            
        }
        div.item{
            background-color: rgb(45, 150, 115);
            border: 1px solid black;
            text-align:center ;
            padding: 30px;
            flex-basis: auto;
        }
        div#i1{
          align-self: center;
        }
         div#i2{
           align-self:flex-end ;
            
        }
         div#i3{
           align-self: flex-start;
        }
         div#i4{
           align-self:center ;
        }
         div#i5{
            align-self: stretch;
        }
         div#i6{
            align-self: self-end;
        }
         div#i7{
           align-self: center; 
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="i1">outro conteudo</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">Conteudo um pouco maior</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">conteudo maior ainda podendo aumentar</div>
        <div class="item" id="i7">G</div>
        

    </div>
    
</body>
</html>
