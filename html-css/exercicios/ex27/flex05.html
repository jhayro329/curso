<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        div.conteiner{
            background-color: rgb(112, 83, 45);

             display:flex;
             flex-flow: row nowrap;
            
      
        
           
           
            
            
        }
        div.item {
            background-color: rgb(45, 150, 115);
            border: 1px solid black;
            text-align:center ;
            padding: 30px;
            flex-basis: 150px;
           
      }
      div#cxA{
         flex-shrink: 0;
         flex-grow: 1;
      }
       div#cxB{
        flex-shrink: 1;
        flex-grow: 1;
      }
       div#cxC{
        flex-shrink: 3;
        flex-grow: 1;
      }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
       
        

    </div>
    
</body>
</html>
