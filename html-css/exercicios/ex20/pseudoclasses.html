<!DOCTYPE html>
<html lang="pt=br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        div{
          display: inline-block; /*TODO CONTEÚDO NA MESMA LINHA*/
          background-color: rgb(151, 129, 101);
          text-align: center;
          border: 1px solid black;
          height: 200px;
          width: 200px;
        }
        div:hover{ /*A DIV COM " : " REPRESENTA UMA PSEUDO CLASSE*/
            background-color:  rgb(197, 169, 132);;
        }
    </style>
</head>
<body>
<div id="d1">01</div>
<div id="d2">02</div>
<div id="d3">03</div>
</body>
</html>
