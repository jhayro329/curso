<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        
        /*
        SELETORES PERSONALISADOS
        # = id
        . = class
        : = pseudo-classe
        :: = pseudo-element
        >  = clildren
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: rgb(162, 5, 5);
            text-decoration: none;     /* USADO PARA FAZER SUBLINHADO*/
            font-weight: bold;        
        }
        a:visited { /*É USADO PARA LINK JÁ VISITADO*/
            color: brown;
        }
        a:hover{
            color: rgba(26, 26, 40, 0.506);
            text-decoration: underline;
        }
        a:active{
            color: yellowgreen;
        }
        .especial{
            background-color: rgba(234, 206, 206, 0.599);
        }
       
           .especial::before{
            content:' → ' ;
           }  
        
        
        .especial::after{   
            content: '  ←  ' ;
                                            /*CONTENT SIGNIFICA CONTEÚDO*/
            
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank" class="especial">Canal do youtube</a></li>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank" class="especial">Site do Curso</a></li>
    </ul>
    
</body>
</html>
