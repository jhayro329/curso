<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
      }
      h1{ 
        background-color: bisque;
        text-align: center;
       
        
      }
      h1:hover{
        background-color: aquamarine;
   
      }
     
      div > p { /*NESTE EX: O PARÁGRAFO SÓ PODE SER CONF DENTRO DE UMA DIV INDIVIDUALMENTE*/
        display: none;
      }

      div:hover > p{ /* HOVER QUER DIZER...PASSAR OMOUSE EM CIMA*/
        display: block; /* MOSTRA O OBJETO*/
        color: aliceblue;
        background-color: rgba(255, 0, 0, 0.116);
        width: 150px;
      }
      div:hover{ /*HOVER É UMA PSEUDOCLASSE DE VARIOS ELEMENTOS*/
        color: rgb(255, 0, 0);



        
    }
    div > p{
      display:none;
    }
    div:hover > p{
      display: block;
    }
    </style>
</head>
<body>
    
    <h1 id="hover">Exemplo de Hover</h1>

    <p>Passe o mouse sobre o texto abaixo</p>
    <div>Passe o mouse aqui
        <p> <img src="icon-tablet.png" alt="tablet">


        </p>
    </div>
    <p>Fim do Exemplo</p><br>


    <p>Veja o Iphone</p>
    <div >passe o mouse
        <p>  <img src="icon-phone.png" alt="iphone"></p>
    </div>
  
    
    
</body>
</html>
