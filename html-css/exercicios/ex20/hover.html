<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
      }
      h1{ 
        background-color: bisque;
        text-align: center;
       
        
      }
      h1:hover{
        background-color: aquamarine;
   
      }
     
      div > p { /*NESTE EX: O PARÁGRAFO SÓ PODE SER CONF DENTRO DE UMA DIV INDIVIDUALMENTE*/
        display: none;
      }

      div:hover > p{ /* HOVER QUER DIZER...PASSAR OMOUSE EM CIMA*/
        display: block; /* MOSTRA O OBJETO*/
        color: aliceblue;
        background-color: red;
        width: 200px;
      }
      div:hover{ /*HOVER É UMA PSEUDOCLASSE DE VARIOS ELEMENTOS*/
        color: red;
        
    }
    </style>
</head>
<body>
    
    <h1 id="hover">Exemplo de Hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>Passe o mouse aqui
        <p>TEXTO ESCONDIDO</p>
    </div>
    <p>Fim do Exemplo</p>
    
    
</body>
</html>
