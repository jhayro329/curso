<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo vídeos com Html5</title>
</head>
<body>
   <h1>Inserindo vídeos hospedados localmente.</h1>
   <p><ins>Esse vídeo está hospedado no meu proprio servidor;</ins></p> 

   <video width="300" height="200" poster="imagem/capa.jpg" controls>
    <source src="midia/myvideomp4.mp4" type="video/mp4">
    <source src="midia/vidmkv.mkv" type="video/mkv">
    <source src="midia/vidmkv.Ogg" type="video/ogg">
    <source src="midia/vidogv.ogv" type="video/ogv">
     <p>seu navegador não tem compatibilidade com reprodutor de vídeo.</p>
     </video>

     <h1><ins>Inserindo Vídeos do You Tube</ins></h1>
     <p>Esse vídeo foi postado através de um link externo.</p>
     <iframe width="300" height="200" src="https://www.youtube.com/embed/3w2SlSt3AJA?si=4TVmjR2wXAjUOhbV" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
     <hr>

     <div style="padding:45.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/96490511?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:400;height:200;" title="Musica Nostra"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>

    

             


</body>
