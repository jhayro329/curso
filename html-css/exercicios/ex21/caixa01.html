<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{ 
            display: flex;                      /* BOX - LEVEL*/
            background-color: rgba(58, 63, 63, 0.465);
            height: 300px;
            width: 300px;
           
            

            border: 10px solid red;
           
            padding: 10px 10px 10px 10px;

            margin: auto;
            
            outline: 5px dashed blueviolet;
          
        }
        a{ /* INLINE - LEVEL*/
            border: 5px solid brown;
         
            padding:10px 10px 10px 10px;
            
        }
        p ,a{
            padding-top:  20px;
        }
    </style>
</head>
<body>
    <h1>Evemplo de caixas box-level</h1>
    <p>parágrafos tambem são exemplos de box-level,mas os <a href="#"> links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona</p>
    
</body>
</html>
